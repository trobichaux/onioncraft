name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # For OIDC auth with Azure (can be configured later for keyless auth)

concurrency:
  group: deploy-production
  cancel-in-progress: false # Don't cancel active deployments

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx next lint
      - run: npx tsc --noEmit
      - run: npx jest --ci
      - run: npx next build

      # NOTE: OIDC-based keyless auth can replace the API token once
      # Azure federated credentials are configured for this repository.
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          output_location: .next
          skip_app_build: true # Already built above
